name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dlang-community/setup-dlang@v1
        with:
          compiler: ldc-latest

      - name: Build (library)
        run: dub build
